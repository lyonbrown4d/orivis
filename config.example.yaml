      # MySQL probe example:
      # - name: mysql-local
      #   type: mysql
      #   target: mysql://root:password@127.0.0.1:3306/app?parseTime=true
      #   group: datastores
      #   environment: dev
      #   enabled: true
      #   interval: 15s
      #   timeout: 3s
      #   retry_count: 0
      #   aggregation: majority_down
      # PostgreSQL probe example:
      # - name: postgres-local
      #   type: postgres
      #   target: postgres://postgres:password@127.0.0.1:5432/app?sslmode=disable
      #   group: datastores
      #   environment: dev
      #   enabled: true
      #   interval: 15s
      #   timeout: 3s
      #   retry_count: 0
      #   aggregation: majority_down
      # Ping probe example:
      # - name: loopback-ping

app:
  env: development

http:
  addr: :8080

log:
  level: info

db:
  driver: memory
  dsn: ""
  memory_result_retention: 24h
  memory_cleanup_interval: 1m

auth:
  agent:
    token: ""

observability:
  prometheus:
    enabled: false
    namespace: orivis

server:
  url: http://127.0.0.1:8080

agent:
  name: local-agent
  token: ""
  region: local
  environments:
    - dev

runtime: host

poll:
  interval: 30s

discovery:
  docker:
    enabled: false
    mode: container

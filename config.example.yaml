app:
  env: development

http:
  addr: :8080

log:
  level: info

db:
  driver: sqlite
  dsn: file:orivis?mode=memory&cache=shared

auth:
  agent:
    token: ""
  dashboard:
    enabled: false
    username: admin
    password: ""

observability:
  prometheus:
    enabled: false
    namespace: orivis

server:
  url: http://127.0.0.1:8080

agent:
  name: local-agent
  token: ""
  region: local
  environments:
    - dev

runtime: host

poll:
  interval: 30s

discovery:
  static:
    enabled: true
    monitors:
      - name: server-health
        type: http
        target: http://127.0.0.1:8080/healthz
        environment: dev
        enabled: true
        interval: 15s
        timeout: 3s
        retry_count: 0
        aggregation: majority_down
  docker:
    enabled: false
    mode: container

services:
  server:
    image: ghcr.io/lyonbrown4d/orivis-server:${ORIVIS_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - server.env
    ports:
      - "${ORIVIS_HTTP_PORT:-8080}:8080"
    volumes:
      - orivis-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12

  agent:
    image: ghcr.io/lyonbrown4d/orivis-agent:${ORIVIS_IMAGE_TAG:-latest}
    restart: unless-stopped
    user: root
    env_file:
      - agent.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - orivis-agent-data:/data
    depends_on:
      server:
        condition: service_healthy

volumes:
  orivis-data:
  orivis-agent-data:

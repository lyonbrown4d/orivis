services:
  server:
    image: ghcr.io/lyonbrown4d/orivis-server:latest
    restart: unless-stopped
    env_file:
      - server.env
    ports:
      - "8080:8080"
    volumes:
      - orivis-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12

  agent:
    image: ghcr.io/lyonbrown4d/orivis-agent:latest
    restart: unless-stopped
    env_file:
      - agent.env
    depends_on:
      server:
        condition: service_healthy

volumes:
  orivis-data:

{{$t := .T}}
<!doctype html>
<html lang="{{.Lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{call $t "login.title"}} | Orivis</title>
  <link rel="stylesheet" href="/assets/dashboard.css">
  <script src="/assets/dashboard-head.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/dashboard.js" defer></script>
</head>
<body class="min-h-screen bg-[#f5f1e8] text-slate-950 transition-colors dark:bg-[#07110f] dark:text-slate-100">
  <main class="grid min-h-screen place-items-center px-4 py-10">
    <section class="w-full max-w-md overflow-hidden rounded-[2rem] border border-slate-900/10 bg-white shadow-2xl shadow-slate-900/10 dark:border-white/10 dark:bg-slate-950">
      <div class="bg-[#10221f] px-8 py-8 text-white">
        <p class="text-xs uppercase tracking-[0.35em] text-emerald-200">{{call $t "page.subtitle"}}</p>
        <h1 class="mt-3 text-4xl font-black tracking-tight">Orivis</h1>
        <p class="mt-3 text-sm text-emerald-50/80">{{call $t "login.subtitle"}}</p>
      </div>

      <form id="orivis-login-form" class="space-y-5 p-8" data-redirect="{{.RedirectPath}}">
        <div>
          <label class="text-sm font-bold text-slate-700 dark:text-slate-200" for="orivis-login-username">{{call $t "login.username"}}</label>
          <input id="orivis-login-username" name="username" autocomplete="username" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-emerald-700 focus:bg-white dark:border-white/10 dark:bg-white/5 dark:text-white dark:focus:border-emerald-300" required>
        </div>
        <div>
          <label class="text-sm font-bold text-slate-700 dark:text-slate-200" for="orivis-login-password">{{call $t "login.password"}}</label>
          <input id="orivis-login-password" name="password" type="password" autocomplete="current-password" class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-emerald-700 focus:bg-white dark:border-white/10 dark:bg-white/5 dark:text-white dark:focus:border-emerald-300" required>
        </div>
        <p id="orivis-login-error" class="hidden rounded-2xl bg-rose-50 p-3 text-sm font-semibold text-rose-700 dark:bg-rose-950/40 dark:text-rose-200">{{call $t "login.error"}}</p>
        <button class="w-full rounded-2xl bg-slate-950 px-4 py-3 text-sm font-black text-white transition hover:bg-emerald-950 dark:bg-white dark:text-slate-950 dark:hover:bg-emerald-100" type="submit">
          {{call $t "login.submit"}}
        </button>
      </form>

      <div class="flex items-center justify-between border-t border-slate-100 px-8 py-5 dark:border-white/10">
        <div class="flex gap-2">
          {{range .LangOptions}}
          <button
            type="button"
            class="rounded-full px-3 py-1 text-xs {{if .Active}}bg-slate-900 text-white dark:bg-white dark:text-slate-950{{else}}border border-slate-300 bg-white text-slate-700 dark:border-white/10 dark:bg-slate-900 dark:text-slate-200{{end}}"
            onclick="switchLang('{{.Code}}')"
          >{{.Label}}</button>
          {{end}}
        </div>
        <button type="button" class="theme-button rounded-full border border-slate-300 bg-white px-3 py-1 text-xs text-slate-700 dark:border-white/10 dark:bg-slate-900 dark:text-slate-200" data-theme-value="auto" onclick="switchTheme('auto')">{{call $t "theme.auto"}}</button>
      </div>
    </section>
  </main>
</body>
</html>

{{ define "base" }}
<!doctype html>
<html lang="{{ .Locale }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>{{ .Title }} - Orivis</title>
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <script src="https://cdn.tailwindcss.com" defer></script>
  <link href="{{ .Links.Static }}/app.css" rel="stylesheet">
</head>
<body class="orivis-shell min-h-screen antialiased overflow-x-hidden">
  {{ if .Public }}
  <main class="min-h-screen w-full px-4 py-6 sm:px-6 lg:px-8"{{ if .AutoRefresh }} hx-get="{{ .Links.Refresh }}" hx-trigger="every 10s" hx-select="main" hx-target="this" hx-swap="outerHTML" hx-push-url="false"{{ end }}>
    {{ block "content" . }}{{ end }}
  </main>
  {{ else }}
  <div class="orivis-layout-shell min-h-screen lg:grid lg:grid-cols-[18rem_minmax(0,1fr)]">
    {{ template "nav" . }}
    <main class="orivis-shell-main orivis-shell-main-public min-h-screen min-w-0 px-4 py-6 sm:px-6 lg:px-8"{{ if .AutoRefresh }} hx-get="{{ .Links.Refresh }}" hx-select="main" hx-target="this" hx-swap="outerHTML" hx-push-url="false"{{ end }}>
      {{ block "content" . }}{{ end }}
    </main>
  </div>
  {{ end }}
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="{{ .Links.Static }}/app.js" defer></script>
</body>
</html>
{{ end }}
